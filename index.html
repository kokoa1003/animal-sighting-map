<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="貼り付けた英語歌詞の単語やフレーズをタップして日本語の意味を確認できる学習アプリ"
    />
    <title>Lyric Reader</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <p class="eyebrow">Tap to learn</p>
        <h1>Lyric Reader</h1>
        <p class="lead">
          歌詞を貼り付けて、単語やフレーズをタップして意味を確認できます。歌詞は保存せず、画面上だけで処理します。
        </p>
      </section>

      <section class="input-panel" aria-label="歌詞入力">
        <label for="lyrics-input">歌詞入力</label>
        <textarea id="lyrics-input" placeholder="ここに英語の歌詞を貼り付けてください"></textarea>
        <div class="actions">
          <button id="load-button" class="primary" type="button">読み込み</button>
          <button id="clear-button" class="secondary" type="button">クリア</button>
        </div>
        <p id="dictionary-status" class="dictionary-status">辞書を読み込み中...</p>
      </section>

      <section id="lyrics-output" class="lyrics-output" aria-label="歌詞表示">
        <p class="empty">歌詞を貼り付けて「読み込み」を押すと、ここに行ごとに表示されます。</p>
      </section>
    </main>

    <section id="definition-card" class="definition-card" aria-live="polite" aria-hidden="true">
      <div class="card-inner">
        <div class="card-header">
          <div>
            <p class="card-label">Meaning</p>
            <h2 id="selected-term"></h2>
          </div>
          <button id="close-card-button" class="close-button" type="button" aria-label="解説カードを閉じる">×</button>
        </div>
        <div id="definition-content"></div>
      </div>
    </section>

    <script src="./script.js"></script>
  </body>
</html>
